<!DOCTYPE html>
<html>
<head>
<title>AI Knowledge Bot</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chat{
width:420px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:10px;
}

#messages{
height:300px;
overflow-y:auto;
text-align:left;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
background:#6366f1;
color:white;
border:none;
}

</style>

</head>

<body>

<h1>🤖 AI Knowledge Bot</h1>

<div id="chat">

<div id="messages"></div>

<input id="question" placeholder="Ask something">
<button onclick="ask()">Send</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyNKHAXfqPIGOZI6So4SYd9bCl3_ggVY71cgIJMWOMntvy1LusVCGVS1hCjGY1vno3Y/exec";

async function ask(){

let q=document.getElementById("question").value;

document.getElementById("messages").innerHTML +=
"<p><b>You:</b> "+q+"</p>";

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify({question:q})
});

let data=await res.json();

document.getElementById("messages").innerHTML +=
"<p><b>AI:</b> "+data.reply+"</p>";

}

</script>

</body>
</html>
